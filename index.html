<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم روابط Talmid Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .main-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 600px; text-align: center; }
        h1 { color: var(--primary); font-size: 24px; margin-bottom: 20px; }
        .desc { color: #666; font-size: 14px; margin-bottom: 25px; }
        .input-box { text-align: right; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }
        .btn-gen { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-gen:hover { background: #1557b0; }
        #result-section { margin-top: 30px; display: none; background: #e8f0fe; padding: 20px; border-radius: 10px; border: 1px dashed var(--primary); }
        textarea { width: 100%; height: 70px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; padding: 10px; resize: none; direction: ltr; font-family: monospace; }
        .btn-copy { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 5px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>🚀 مولد روابط Talmid Hub</h1>
    <p class="desc">ضع رابط Google Drive بالأسفل لتحويله إلى رابط مشفر يعمل مع صفحة التحميل بمدونتك تلقائياً.</p>
    
    <div class="input-box">
        <label>رابط ملف الـ PDF من درايف:</label>
        <input type="text" id="driveLink" placeholder="https://drive.google.com/file/d/..." />
    </div>

    <button onclick="makeLink()" class="btn-gen">توليد الرابط المشفر ✨</button>

    <div id="result-section">
        <label style="color: var(--primary);">انسخ الرابط وضعه في تدوينتك:</label>
        <textarea id="finalUrl" readonly></textarea>
        <button onclick="copyIt()" class="btn-copy">نسخ الرابط الجاهز</button>
    </div>
</div>

<script>
function makeLink() {
    const driveUrl = document.getElementById('driveLink').value;
    // رابط صفحة التحميل الخاصة بك (تم تثبيتها هنا)
    const blogBaseUrl = "https://www.talmidhub.net/p/download.html";
    
    const regex = /(?:\/d\/|id=)([\w-]+)/;
    const match = driveUrl.match(regex);

    if (match && match[1]) {
        const fileId = match[1];
        // تشفير الـ ID
        const encodedId = btoa(fileId);
        // تكوين الرابط النهائي
        const finalLink = `${blogBaseUrl}?id=${encodedId}`;

        document.getElementById('finalUrl').value = finalLink;
        document.getElementById('result-section').style.display = 'block';
    } else {
        alert('يرجى إدخال رابط Google Drive صحيح يحتوي على معرف الملف.');
    }
}

function copyIt() {
    const copyText = document.getElementById("finalUrl");
    copyText.select();
    document.execCommand("copy");
    alert("تم النسخ! يمكنك الآن لصقه في موضوعك على بلوجر.");
}
</script>

</body>
</html>
