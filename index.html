<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم Talmid Hub | مولد الأكواد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --bg: #f1f3f4; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-gen { background: var(--primary); color: white; margin-top: 10px; }
        .btn-gen:hover { background: #1557b0; }
        #output { display: none; margin-top: 25px; border-top: 2px solid #eee; padding-top: 20px; }
        .code-box { background: #272c33; color: #adbac7; padding: 15px; border-radius: 8px; position: relative; margin-top: 10px; }
        textarea { width: 100%; height: 180px; background: transparent; color: #9cdcfe; border: none; font-family: monospace; resize: none; direction: ltr; }
        .copy-badge { background: var(--success); color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer; float: left; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛠️ مولد صناديق التحميل</h1>
    
    <div class="input-group">
        <label>1. اسم الملف (يظهر للزائر):</label>
        <input type="text" id="fileName" placeholder="مثال: كتاب اللغة العربية PDF">
    </div>

    <div class="input-group">
        <label>2. رابط ملف Google Drive:</label>
        <input type="text" id="driveLink" placeholder="https://drive.google.com/file/d/...">
    </div>

    <button class="btn-gen" onclick="generateFullCode()">توليد كود التدوينة ✨</button>

    <div id="output">
        <h3 style="text-align: right;">انسخ الكود وضعه في تدوينتك (وضع HTML):</h3>
        <div class="code-box">
            <span class="copy-badge" onclick="copyCode()">نسخ الكود</span>
            <textarea id="finalHTML" readonly></textarea>
        </div>
        <p style="font-size: 13px; color: #666; text-align: right; margin-top: 10px;">
            💡 هذا الكود يحتوي على الزر المشفر الذي سيوجه الزائر تلقائياً لصفحة التحميل بمدونتك.
        </p>
    </div>
</div>

<script>
function generateFullCode() {
    const name = document.getElementById('fileName').value || "تحميل الملف";
    const driveUrl = document.getElementById('driveLink').value;
    const blogPage = "https://www.talmidhub.net/p/download.html";

    const regex = /(?:\/d\/|id=)([\w-]+)/;
    const match = driveUrl.match(regex);

    if (match && match[1]) {
        const fileId = match[1];
        const encodedId = btoa(fileId);
        const finalRedirectUrl = `${blogPage}?id=${encodedId}`;

        // توليد كود HTML الذي سيوضع في بلوجر
        const htmlTemplate = `<div class="th-download-box" style="border: 2px solid #1a73e8; border-radius: 12px; padding: 20px; text-align: center; background: #ffffff; margin: 20px 0; font-family: 'Tajawal', sans-serif; direction: rtl;">
    <div style="font-size: 18px; font-weight: bold; color: #333; margin-bottom: 15px;">📥 ${name}</div>
    <p style="font-size: 14px; color: #666; margin-bottom: 20px;">انقر على الزر أدناه للانتقال لصفحة التحميل المباشر الآمنة.</p>
    <a href="${finalRedirectUrl}" target="_blank" style="background: #1a73e8; color: #ffffff !important; padding: 12px 35px; border-radius: 8px; text-decoration: none; font-weight: bold; display: inline-block; transition: 0.3s;">اضغط هنا للتحميل المباشر</a>
    <div style="margin-top: 15px; font-size: 11px; color: #999;">رابط آمن ومفحص ضد الفيروسات</div>
</div>`;

        document.getElementById('finalHTML').value = htmlTemplate;
        document.getElementById('output').style.display = 'block';
    } else {
        alert('تأكد من رابط جوجل درايف!');
    }
}

function copyCode() {
    const text = document.getElementById("finalHTML");
    text.select();
    document.execCommand("copy");
    alert("تم نسخ الكود! اذهب لمدونتك والصقه في وضع HTML.");
}
</script>

</body>
</html>
